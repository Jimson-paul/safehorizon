name: safehorizon
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # API calls
  http: ^1.6.0

  # Map (OpenStreetMap)
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Location + Permissions
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # ✅ Image upload (camera/gallery)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true