name: safehorizon
description: "Safe Horizon Accident Reporting App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ================= API =================
  http: ^1.6.0

  # ================= MAP (OpenStreetMap) =================
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # ================= LOCATION =================
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # ================= CAMERA / IMAGE =================
  image_picker: ^1.1.2

  # ================= DATE FORMAT =================
  intl: ^0.19.0

  # ================= LOCAL STORAGE (AUTO LOGIN) =================
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png