name: safehorizon
description: "Safe Horizon Accident Reporting App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ================= NETWORK / API =================
  http: ^1.6.0

  # ================= MAP =================
  google_maps_flutter: ^2.15.0

  # ================= LOCATION =================
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # ================= CAMERA / IMAGE =================
  image_picker: ^1.1.2

  # ================= DATE FORMAT =================
  intl: ^0.19.0

  # ================= LOCAL STORAGE =================
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png